name: Bug report
description: Report a reproducible problem in the Skill, scripts, examples, or documentation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, signed URLs, private portraits, voice samples, or client videos.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: Include the command and a minimal privacy-safe input.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, Codex surface, ffmpeg version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, signed URLs, private media, and client data.
          required: true
